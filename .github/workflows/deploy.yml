name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command 
            --instance-ids i-085556772bfeba172 
            --document-name AWS-RunShellScript 
            --parameters commands=['cd /var/www/nexabuilder/backend/current','git fetch origin main && git reset --hard origin/main','source venv/bin/activate && pip install -r requirements.txt --quiet','sudo systemctl restart nexabuilder','sleep 5 && curl -s http://localhost:8000/health'] 
            --region us-west-1 
            --query Command.CommandId 
            --output text)

          echo SSM Command: $COMMAND_ID
          sleep 25

          aws ssm get-command-invocation 
            --command-id $COMMAND_ID 
            --instance-id i-085556772bfeba172 
            --region us-west-1 
            --query StandardOutputContent 
            --output text
