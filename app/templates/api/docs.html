{% extends "vuexy_base.html" %}
{% block title %}API Docs · DotSchools{% endblock %}
{% block content %}
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">API Documentation</h5>
            <a class="btn btn-sm btn-outline-primary"
               href="/api/schema/"
               target="_blank">Download schema (OpenAPI JSON)</a>
        </div>
        <div class="card-body p-0" style="height: calc(100vh - 260px);">
            <iframe src="/api/docs/"
                    style="border:0;
                           width:100%;
                           height:100%"
                    title="Swagger UI"></iframe>
        </div>
    </div>
{% endblock %}
